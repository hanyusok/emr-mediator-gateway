<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편 환자 대기 등록 (Instant Check-In)</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="header">
            <div class="logo-icon">
                <!-- User Registry Icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
            </div>
            <h1>간편 대기 등록</h1>
            <div class="subtitle">이름과 생년월일을 입력하여 바로 접수합니다.</div>
        </div>

        <form id="checkin-form" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="pname">환자 이름 (Name)</label>
                <input type="text" id="pname" placeholder="홍길동" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="pbirth">생년월일 (Birthdate)</label>
                <input type="date" id="pbirth" required>
            </div>

            <button type="submit" id="submit-btn">
                <span>접수 등록하기</span>
            </button>
        </form>

        <div id="status-container" class="status-box"></div>
    </div>

    <script>
        const GATEWAY_URL = "http://127.0.0.1:8000";

        async function handleFormSubmit(event) {
            event.preventDefault();

            const nameInput = document.getElementById("pname");
            const birthInput = document.getElementById("pbirth");
            const submitBtn = document.getElementById("submit-btn");
            const statusBox = document.getElementById("status-container");

            const pname = nameInput.value.trim();
            const pbirth = birthInput.value; // YYYY-MM-DD format

            if (!pname || !pbirth) return;

            // Reset & Loading State
            submitBtn.disabled = true;
            statusBox.className = "status-box loading";
            statusBox.innerHTML = '<div class="spinner"></div><span>환자 기록 검색 중...</span>';

            try {
                // 1. Query MTSDB to check if patient already exists
                const patientsUrl = `${GATEWAY_URL}/api/patients?pname=${encodeURIComponent(pname)}`;
                const resPatients = await fetch(patientsUrl);

                let pcode = 99999; // Fallback default patient code

                if (resPatients.ok) {
                    const patientsList = await resPatients.json();

                    // Look for a patient with the exact name and matching birthdate
                    // birthdate from API is usually YYYY-MM-DD ISO format
                    const match = patientsList.find(p => {
                        const birthMatch = p.pbirth === pbirth;
                        const nameMatch = p.pname === pname;
                        return nameMatch && birthMatch;
                    });

                    if (match) {
                        pcode = match.pcode;
                        console.log(`Found existing patient! Pcode: ${pcode}`);
                    } else {
                        throw new Error("방문 기록이 없습니다. 접수 직원에게 문의해주세요.");
                    }
                }

                // 2. Update status and register on MTSMTR
                statusBox.innerHTML = '<div class="spinner"></div><span>대기 열에 등록 중...</span>';

                const registerUrl = `${GATEWAY_URL}/api/mtr`;
                const payload = {
                    pcode: pcode,
                    pname: pname,
                    pbirth: pbirth
                };

                const resRegister = await fetch(registerUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!resRegister.ok) {
                    const errorDetails = await resRegister.json();
                    throw new Error(errorDetails.detail || "대기 등록에 실패했습니다.");
                }

                const result = await resRegister.json();
                console.log("Registration success:", result);

                // Success State
                statusBox.className = "status-box success";
                statusBox.innerHTML = `
                    <svg style="width:1.25rem;height:1.25rem;fill:currentColor" viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    <span>대기 등록 성공! (ID: ${result.mtr_id || '-'})</span>
                `;

                // Reset form
                nameInput.value = "";
                birthInput.value = "";

            } catch (err) {
                console.error("Check-in error:", err);
                statusBox.className = "status-box error";
                statusBox.innerHTML = `
                    <svg style="width:1.25rem;height:1.25rem;fill:currentColor" viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    <span>오류: ${err.message}</span>
                `;
            } finally {
                submitBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
