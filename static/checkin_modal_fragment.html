<!-- Check-in Modal fragment (for review) -->
<div id="checkin-modal" class="checkin-modal" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:60;">
  <div style="background:var(--panel-bg); border-radius:8px; width: 420px; max-width:95%; padding:1rem; box-shadow:0 8px 30px rgba(0,0,0,0.4);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
      <h3 style="margin:0; font-size:1rem;">대기 접수 (Check-in)</h3>
      <button onclick="closeCheckInModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.2rem;">&times;</button>
    </div>

    <div style="display:flex; flex-direction:column; gap:0.5rem;">
      <label style="font-size:0.85rem; color:var(--text-muted);">진료과 (Department)</label>
      <select id="checkin-dept" style="padding:0.45rem;border-radius:6px;border:1px solid rgba(255,255,255,0.06);">
        <option value="14" data-name="가정의학과">14 - 가정의학과</option>
        <option value="15" data-name="소아청소년과">15 - 소아청소년과</option>
        <option value="01" data-name="내과">01 - 내과</option>
        <option value="13" data-name="가정의학과">13 - 가정의학과</option>
      </select>

      <label style="font-size:0.85rem; color:var(--text-muted);">진료의 (Doctor)</label>
      <select id="checkin-doctor" style="padding:0.45rem;border-radius:6px;border:1px solid rgba(255,255,255,0.06);">
        <option value="63221" data-name="한유석">63221 - 한유석</option>
        <option value="12041" data-name="홍길동">12041 - 홍길동</option>
        <option value="99401" data-name="김의사">99401 - 김의사</option>
      </select>

      <label style="font-size:0.85rem; color:var(--text-muted);">진료실 (Room)</label>
      <select id="checkin-room" style="padding:0.45rem;border-radius:6px;border:1px solid rgba(255,255,255,0.06);">
        <option value="1" data-name="제1진료실">1 - 제1진료실</option>
        <option value="2" data-name="제2진료실">2 - 제2진료실</option>
        <option value="3" data-name="제3진료실">3 - 제3진료실</option>
      </select>

      <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.6rem;">
        <button class="btn-secondary" onclick="closeCheckInModal()" style="padding:0.5rem 0.9rem;">취소</button>
        <button class="btn-primary" onclick="submitCheckIn()" style="padding:0.5rem 0.9rem;">접수</button>
      </div>
    </div>
  </div>
</div>
